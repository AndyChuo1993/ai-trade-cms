<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#F8FAFC"/>
  <rect x="70" y="60" width="1060" height="510" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="110" y="120" font-family="ui-sans-serif, system-ui" font-size="28" font-weight="700" fill="#0F172A">買家來源快速比較</text>
  <text x="110" y="155" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">先選 1–2 個來源做驗證，再把有效做法放大</text>

  <g font-family="ui-sans-serif, system-ui" font-size="14">
    <g fill="#0F172A" font-weight="700">
      <text x="140" y="220">來源</text>
      <text x="500" y="220">適合情境</text>
      <text x="860" y="220">提醒</text>
    </g>
    <g stroke="#E5E7EB">
      <line x1="120" y1="235" x2="1080" y2="235"/>
    </g>

    <g fill="#0F172A">
      <text x="140" y="275" font-weight="700">搜尋引擎＋產業目錄</text>
      <text x="500" y="275">建立種子名單、找利基角色</text>
      <text x="860" y="275">很快，但需要人工驗證</text>

      <text x="140" y="335" font-weight="700">領英</text>
      <text x="500" y="335">觸達決策鏈與關鍵職位</text>
      <text x="860" y="335">適合做角色確認與訊息測試</text>

      <text x="140" y="395" font-weight="700">展會名單</text>
      <text x="500" y="395">高意圖買家</text>
      <text x="860" y="395">展前邀約＋展後跟進很關鍵</text>

      <text x="140" y="455" font-weight="700">協會名錄</text>
      <text x="500" y="455">名單品質相對佳</text>
      <text x="860" y="455">常見於經銷/進口通路</text>

      <text x="140" y="515" font-weight="700">進出口資料</text>
      <text x="500" y="515">鎖定有持續進口紀錄者</text>
      <text x="860" y="515">適合重視進口頻率的品類</text>
    </g>

    <g stroke="#F1F5F9">
      <line x1="120" y1="295" x2="1080" y2="295"/>
      <line x1="120" y1="355" x2="1080" y2="355"/>
      <line x1="120" y1="415" x2="1080" y2="415"/>
      <line x1="120" y1="475" x2="1080" y2="475"/>
      <line x1="120" y1="535" x2="1080" y2="535"/>
    </g>
  </g>
</svg>

