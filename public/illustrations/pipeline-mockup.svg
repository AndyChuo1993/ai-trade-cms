<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="900" fill="transparent"/>
  
  <!-- Main App Window -->
  <rect x="20" y="40" width="1160" height="820" rx="16" fill="white" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Header Bar -->
  <rect x="20" y="40" width="1160" height="60" fill="#F8FAFC" rx="16" />
  <rect x="20" y="80" width="1160" height="20" fill="#F8FAFC" /> <!-- flat bottom for header -->
  <line x1="20" y1="100" x2="1180" y2="100" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Window Controls -->
  <circle cx="50" cy="70" r="6" fill="#CBD5E1"/>
  <circle cx="70" cy="70" r="6" fill="#CBD5E1"/>
  <circle cx="90" cy="70" r="6" fill="#CBD5E1"/>
  
  <rect x="140" y="60" width="200" height="20" rx="4" fill="#E2E8F0"/>

  <!-- Sidebar -->
  <rect x="20" y="100" width="220" height="760" fill="#F8FAFC" rx="16"/>
  <rect x="240" y="100" width="20" height="760" fill="#F8FAFC" />
  <line x1="240" y1="100" x2="240" y2="860" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Sidebar items -->
  <rect x="40" y="140" width="160" height="32" rx="8" fill="#DBEAFE"/>
  <rect x="52" y="150" width="80" height="12" rx="4" fill="#1E3A8A"/>
  
  <rect x="40" y="190" width="160" height="32" rx="8" fill="white"/>
  <rect x="52" y="200" width="100" height="12" rx="4" fill="#94A3B8"/>
  
  <rect x="40" y="240" width="160" height="32" rx="8" fill="white"/>
  <rect x="52" y="250" width="60" height="12" rx="4" fill="#94A3B8"/>

  <!-- Main Content - Kanban Board -->
  <!-- Column 1: Leads -->
  <rect x="280" y="140" width="260" height="700" fill="#F1F5F9" rx="12"/>
  <rect x="300" y="160" width="100" height="16" rx="4" fill="#64748B"/>
  <rect x="500" y="160" width="20" height="16" rx="8" fill="#CBD5E1"/>
  
  <!-- Card 1 -->
  <rect x="300" y="200" width="220" height="100" fill="white" rx="8" stroke="#E2E8F0"/>
  <rect x="320" y="220" width="140" height="12" rx="4" fill="#334155"/>
  <rect x="320" y="245" width="80" height="10" rx="4" fill="#94A3B8"/>
  <rect x="320" y="270" width="60" height="16" rx="4" fill="#FEF3C7"/>

  <!-- Card 2 -->
  <rect x="300" y="316" width="220" height="100" fill="white" rx="8" stroke="#E2E8F0"/>
  <rect x="320" y="336" width="120" height="12" rx="4" fill="#334155"/>
  <rect x="320" y="361" width="90" height="10" rx="4" fill="#94A3B8"/>
  <rect x="320" y="386" width="60" height="16" rx="4" fill="#FEF3C7"/>

  <!-- Column 2: Responded -->
  <rect x="570" y="140" width="260" height="700" fill="#F1F5F9" rx="12"/>
  <rect x="590" y="160" width="120" height="16" rx="4" fill="#3B82F6"/>
  
  <!-- Card 3 -->
  <rect x="590" y="200" width="220" height="120" fill="white" rx="8" stroke="#BFDBFE" stroke-width="2"/>
  <rect x="610" y="220" width="160" height="12" rx="4" fill="#1E3A8A"/>
  <rect x="610" y="245" width="100" height="10" rx="4" fill="#64748B"/>
  <rect x="610" y="270" width="180" height="30" rx="4" fill="#EFF6FF"/>

  <!-- Column 3: Quoting / Negotiation -->
  <rect x="860" y="140" width="260" height="700" fill="#F1F5F9" rx="12"/>
  <rect x="880" y="160" width="140" height="16" rx="4" fill="#10B981"/>
  
  <!-- Card 4 -->
  <rect x="880" y="200" width="220" height="140" fill="white" rx="8" stroke="#A7F3D0" stroke-width="2"/>
  <rect x="900" y="220" width="130" height="12" rx="4" fill="#064E3B"/>
  <rect x="900" y="245" width="110" height="10" rx="4" fill="#64748B"/>
  <rect x="900" y="270" width="80" height="24" rx="4" fill="#D1FAE5"/>
  <rect x="900" y="306" width="180" height="10" rx="4" fill="#E2E8F0"/>
  
</svg>
